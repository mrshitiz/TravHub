<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>%WEB_TITLE%</title>
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
    <style id="splash-screen-style">
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #050b14;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }
      .logo-text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 48px;
        letter-spacing: -1px;
        animation: pulse 2s infinite ease-in-out;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
      }
      .progress-container {
        margin-top: 40px;
        width: 200px;
        height: 6px;
        background-color: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        width: 0%;
        background-color: #0ea5e9;
        border-radius: 4px;
        animation: progress 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      @keyframes pulse {
        0% { transform: scale(0.95); opacity: 0.8; }
        50% { transform: scale(1.05); opacity: 1; }
        100% { transform: scale(0.95); opacity: 0.8; }
      }
      @keyframes progress {
        0% { width: 0%; }
        20% { width: 20%; }
        60% { width: 70%; }
        100% { width: 95%; } /* Leaves the last 5% for the React app to fill */
      }
    </style>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    
    <div id="splash-screen">
      <div class="logo-text">
        <span style="font-weight: 300; color: #ffffff;">trav</span><span style="font-weight: 900; color: #0ea5e9;">hub</span>
      </div>
      <div class="progress-container">
        <div class="progress-bar"></div>
      </div>
    </div>

    <!-- The root element for your Expo app. -->
    <div id="root"></div>
  </body>
</html>
